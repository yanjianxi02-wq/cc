name: Publish Yinman site from zip

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract site files
        run: |
          set -euo pipefail
          test -f yinman-creator-site.zip
          rm -rf /tmp/yinman-site
          mkdir -p /tmp/yinman-site
          unzip -o yinman-creator-site.zip -d /tmp/yinman-site
          src=/tmp/yinman-site
          if [ -d /tmp/yinman-site/yinman-creator-site ]; then
            src=/tmp/yinman-site/yinman-creator-site
          fi
          cp "$src/index.html" ./index.html
          cp "$src/README.md" ./README.md
          rm -rf ./web ./outputs
          cp -R "$src/web" ./web
          cp -R "$src/outputs" ./outputs

      - name: Commit extracted site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md web outputs
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Publish Yinman creator site files"
            git push
          fi
